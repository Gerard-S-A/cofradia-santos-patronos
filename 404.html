<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada · Cofradía Santos Patronos Sagunto</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#5b1b14">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="favicon-32.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet"></noscript>
<style>
:root{
  --granate:#5b1b14;
  --granate-oscuro:#43130e;
  --crema:#f6f2ec;
  --papel:#fdfcf9;
  --tinta:#241512;
  --linea:rgba(91,27,20,.16);
  --serif:'Instrument Serif', Georgia, serif;
  --sans:'DM Sans', system-ui, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);color:var(--tinta);background:var(--papel);line-height:1.65;display:flex;flex-direction:column;min-height:100vh}
a{color:var(--granate)}

.contenido{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px}
.codigo{font-family:var(--serif);font-size:clamp(6rem,15vw,10rem);line-height:1;color:var(--granate);opacity:.18}
.titulo{font-family:var(--serif);font-weight:400;font-size:clamp(1.6rem,4vw,2.4rem);color:var(--granate);margin:20px 0 12px}
.texto{color:#4a3833;max-width:420px;margin-bottom:30px}
.boton{display:inline-block;text-decoration:none;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;padding:13px 28px;border-radius:999px;background:var(--granate);color:#fff;transition:.2s}
.boton:hover{background:var(--granate-oscuro)}

footer{background:var(--granate);color:rgba(255,255,255,.7);text-align:center;padding:24px;font-size:.78rem;letter-spacing:.04em}
footer a{color:rgba(255,255,255,.85);text-decoration:none}
footer a:hover{text-decoration:underline}
</style>
</head>
<body>

<main class="contenido">
  <div class="codigo">404</div>
  <h1 class="titulo">Página no encontrada</h1>
  <p class="texto">Lo sentimos, la página que buscas no existe o ha sido movida.</p>
  <a class="boton" href="/">Volver al inicio</a>
</main>

<footer>
  <span>© <script>document.write(new Date().getFullYear())</script> Cofradía de los Santos Abdón y Senén · Sagunto · <a href="/aviso-legal">Aviso legal</a> · <a href="/politica-privacidad">Política de privacidad</a></span>
</footer>

</body>
</html>
