<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso administración · Cofradía Santos Patronos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200..500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/admin.css">
<link rel="icon" href="/icons/favicon.ico">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
</head>
<body class="login-body">
  <main class="login-wrap">
    <div class="login-card">
      <img src="/assets/logo.png" alt="Cofradía Santos Patronos" class="login-logo">
      <h1>Panel de administración</h1>
      <p class="login-sub">Acceso restringido a la Junta Directiva</p>
      <form id="login-form">
        <div class="campo">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="tu@email.com">
        </div>
        <div class="campo">
          <label for="password">Contraseña</label>
          <div class="password-wrap">
            <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
            <button type="button" class="password-toggle" id="toggle-password" aria-label="Mostrar contraseña">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="icon-eye-off oculto" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div id="login-error" class="login-error" role="alert"></div>
        <button type="submit" class="boton-login" id="btn-login">Entrar</button>
      </form>
      <a href="/" class="login-volver">← Volver a la web</a>
    </div>
  </main>
  <script type="module" src="/js/admin.js"></script>
</body>
</html>
